<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>坦克大战-无墙体对战版</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Microsoft YaHei",sans-serif;
}
body{
    background:#2c303a;
    color:#fff;
    text-align:center;
    padding:20px 10px;
}
.tip{
    font-size:18px;
    color:#b0b8c4;
    margin-bottom:10px;
}
canvas{
    background:#000;
    border:3px solid #2196F3;
}
.back-btn{
    display:inline-block;
    margin-top:20px;
    padding:10px 24px;
    background:#2196F3;
    color:#fff;
    text-decoration:none;
    border-radius:8px;
    font-size:16px;
}
.back-btn:hover{
    background:#0b7dda;
}
</style>
</head>
<body>
<div class="tip">WASD移动坦克 | 空格发射子弹 | 子弹击中坦克可击毁，无墙体自由对战</div>
<canvas id="gameCanvas" width="640" height="480"></canvas>
<br>
<a href="../" class="back-btn">返回游戏大厅</a>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const W = canvas.width;
const H = canvas.height;
const TANK_SIZE = 40;
const BULLET_R = 5;
const BULLET_SPEED = 7;

// 按键状态
const keys = {w:false,a:false,s:false,d:false,space:false};

// 玩家坦克
const player = {
    x:60,
    y:180,
    width:TANK_SIZE,
    height:TANK_SIZE,
    speed:3,
    dir:"up",
    color:"#0088ff"
};

let bullets = [];
let enemies = [];
const ENEMY_COUNT = 4;

// 随机方向
function getRandDir(){
    const arr = ["up","down","left","right"];
    return arr[Math.floor(Math.random()*4)];
}

// 生成敌方坦克
function spawnEnemies(){
    enemies = [];
    for(let i=0;i<ENEMY_COUNT;i++){
        const ex = Math.floor(Math.random()*(W-TANK_SIZE));
        const ey = Math.floor(Math.random()*(H-TANK_SIZE));
        enemies.push({
            x:ex,y:ey,
            width:TANK_SIZE,
            height:TANK_SIZE,
            speed:1.6,
            dir:getRandDir(),
            color:"#ff2222",
            timer:0
        });
    }
}

// 绘制坦克
function drawTank(tank){
    ctx.fillStyle = tank.color;
    ctx.fillRect(tank.x,tank.y,tank.width,tank.height);
    ctx.strokeStyle="#fff";
    ctx.lineWidth=2;
    ctx.strokeRect(tank.x,tank.y,tank.width,tank.height);
    const cx = tank.x + tank.width/2;
    const cy = tank.y + tank.height/2;
    ctx.lineWidth=4;
    ctx.beginPath();
    switch(tank.dir){
        case "up": ctx.moveTo(cx,cy);ctx.lineTo(cx,tank.y-14);break;
        case "down":ctx.moveTo(cx,cy);ctx.lineTo(cx,tank.y+tank.height+14);break;
        case "left":ctx.moveTo(cx,cy);ctx.lineTo(tank.x-14,cy);break;
        case "right":ctx.moveTo(cx,cy);ctx.lineTo(tank.x+tank.width+14,cy);break;
    }
    ctx.stroke();
}

// 发射子弹
function shoot(tank){
    const cx = tank.x + tank.width/2;
    const cy = tank.y + tank.height/2;
    let bx=cx,by=cy,vx=0,vy=0;
    switch(tank.dir){
        case "up": by = tank.y-10; vy=-BULLET_SPEED; break;
        case "down":by = tank.y+tank.height+10; vy=BULLET_SPEED; break;
        case "left":bx = tank.x-10; vx=-BULLET_SPEED; break;
        case "right":bx = tank.x+tank.width+10; vx=BULLET_SPEED; break;
    }
    bullets.push({x:bx,y:by,vx,vy,r:BULLET_R});
}

// 玩家移动逻辑（仅边界限制，无墙体碰撞）
function updatePlayer(){
    // 更新朝向
    if(keys.w) player.dir = "up";
    if(keys.s) player.dir = "down";
    if(keys.a) player.dir = "left";
    if(keys.d) player.dir = "right";

    let dx = 0;
    let dy = 0;
    switch(player.dir){
        case "up": dy = -player.speed; break;
        case "down": dy = player.speed; break;
        case "left": dx = -player.speed; break;
        case "right": dx = player.speed; break;
    }
    // 预测新坐标
    let newX = player.x + dx;
    let newY = player.y + dy;

    // 画布边界约束
    if(newX < 0) newX = 0;
    if(newX + player.width > W) newX = W - player.width;
    if(newY < 0) newY = 0;
    if(newY + player.height > H) newY = H - player.height;

    player.x = newX;
    player.y = newY;
}

// 更新敌方AI 碰到边界自动换随机方向
function updateEnemies(){
    for(let e of enemies){
        e.timer++;
        if(e.timer > 150){
            e.dir = getRandDir();
            e.timer = 0;
        }
        let dx = 0, dy = 0;
        switch(e.dir){
            case "up": dy = -e.speed; break;
            case "down": dy = e.speed; break;
            case "left": dx = -e.speed; break;
            case "right": dx = e.speed; break;
        }
        let nx = e.x + dx;
        let ny = e.y + dy;
        // 触碰边界随机换方向
        if(nx<0 || nx+e.width>W || ny<0 || ny+e.height>H){
            e.dir = getRandDir();
        }else{
            e.x = nx;
            e.y = ny;
        }
    }
}

// 更新子弹、碰撞逻辑
function updateBullets(){
    for(let i=bullets.length-1;i>=0;i--){
        let b = bullets[i];
        b.x += b.vx;
        b.y += b.vy;
        // 飞出画布销毁子弹
        if(b.x <0 || b.x>W || b.y<0 || b.y>H){
            bullets.splice(i,1);
            continue;
        }
        // 击中敌方坦克
        for(let j=enemies.length-1;j>=0;j--){
            let en = enemies[j];
            if(b.x > en.x && b.x < en.x+en.width && b.y>en.y && b.y<en.y+en.height){
                enemies.splice(j,1);
                bullets.splice(i,1);
                break;
            }
        }
        // 击中玩家
        if(b.x > player.x && b.x < player.x+player.width && b.y>player.y && b.y<player.y+player.height){
            alert("你被击毁，刷新页面重新开局！");
            bullets.splice(i,1);
        }
    }
}

// 绘制子弹
function drawBullets(){
    ctx.fillStyle="#ffff00";
    for(let b of bullets){
        ctx.beginPath();
        ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
        ctx.fill();
    }
}

// 游戏主循环
function gameLoop(){
    ctx.clearRect(0,0,W,H);
    updatePlayer();
    updateEnemies();
    updateBullets();
    drawTank(player);
    enemies.forEach(t=>drawTank(t));
    drawBullets();
    requestAnimationFrame(gameLoop);
}

// 键盘监听
window.addEventListener("keydown",e=>{
    const key = e.key.toLowerCase();
    if(key === "w") keys.w = true;
    if(key === "s") keys.s = true;
    if(key === "a") keys.a = true;
    if(key === "d") keys.d = true;
    if(e.code === "Space" && !keys.space){
        shoot(player);
        keys.space = true;
    }
});
window.addEventListener("keyup",e=>{
    const key = e.key.toLowerCase();
    if(key === "w") keys.w = false;
    if(key === "s") keys.s = false;
    if(key === "a") keys.a = false;
    if(key === "d") keys.d = false;
    if(e.code === "Space") keys.space = false;
});

spawnEnemies();
gameLoop();
</script>
</body>
</html>
