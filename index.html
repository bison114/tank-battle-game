<!DOCTYPE html><br/><html lang="zh-CN"><br/><head><br/>    <meta charset="UTF-8"><br/>    <title>网页版坦克大战</title><br/>    <style><br/>        *{margin:0;padding:0;box-sizing:border-box;background:#1a1a1a}<br/>        canvas{border:3px solid #fff;display:block;margin:20px auto;background:#000}<br/>        .tip{color:#fff;text-align:center;font-size:18px;margin:10px}<br/>    </style><br/></head><br/><body><br/>    <div class="tip">WASD移动 | 空格发射子弹 | 刷新页面重新开始</div><br/>    <canvas id="game" width="600" height="400"></canvas><br/><br/>    <script><br/>        const canvas = document.getElementById('game');<br/>        const ctx = canvas.getContext('2d');<br/>        const TANK_SIZE = 30;<br/>        const BULLET_SIZE = 6;<br/>        const SPEED = 3;<br/>        const BULLET_SPEED = 6;<br/><br/>        // 方向枚举<br/>        const DIR = {UP:0,DOWN:1,LEFT:2,RIGHT:3};<br/>        let keys = {};<br/><br/>        // 坦克类<br/>        class Tank{<br/>            constructor(x,y,dir,color,isPlayer=false){<br/>                this.x = x; this.y = y;<br/>                this.dir = dir; this.color = color;<br/>                this.isPlayer = isPlayer;<br/>            }<br/>            draw(){<br/>                ctx.fillStyle = this.color;<br/>                ctx.fillRect(this.x,this.y,TANK_SIZE,TANK_SIZE);<br/>                ctx.fillStyle = '#000';<br/>                switch(this.dir){<br/>                    case DIR.UP: ctx.fillRect(this.x+12,this.y-12,6,12);break;<br/>                    case DIR.DOWN: ctx.fillRect(this.x+12,this.y+TANK_SIZE,6,12);break;<br/>                    case DIR.LEFT: ctx.fillRect(this.x-12,this.y+12,12,6);break;<br/>                    case DIR.RIGHT: ctx.fillRect(this.x+TANK_SIZE,this.y+12,12,6);break;<br/>                }<br/>            }<br/>            move(){<br/>                let nx = this.x, ny = this.y;<br/>                if(this.isPlayer){<br/>                    if(keys['w']||keys['W']){this.dir=DIR.UP;ny-=SPEED}<br/>                    if(keys['s']||keys['S']){this.dir=DIR.DOWN;ny+=SPEED}<br/>                    if(keys['a']||keys['A']){this.dir=DIR.LEFT;nx-=SPEED}<br/>                    if(keys['d']||keys['D']){this.dir=DIR.RIGHT;nx+=SPEED}<br/>                }else{<br/>                    // 敌方AI<br/>                    if(Math.random()<0.03) this.dir = Math.floor(Math.random()*4);<br/>                    switch(this.dir){<br/>                        case DIR.UP:ny-=SPEED;break;<br/>                        case DIR.DOWN:ny+=SPEED;break;<br/>                        case DIR.LEFT:nx-=SPEED;break;<br/>                        case DIR.RIGHT:nx+=SPEED;break;<br/>                    }<br/>                }<br/>                // 边界检测<br/>                if(nx>=0&&ny>=0&&nx+TANK_SIZE<=canvas.width&&ny+TANK_SIZE<=canvas.height){<br/>                    this.x=nx;this.y=ny;<br/>                }else{<br/>                    if(!this.isPlayer) this.dir = Math.floor(Math.random()*4);<br/>                }<br/>            }<br/>        }<br/><br/>        // 子弹类<br/>        class Bullet{<br/>            constructor(x,y,dir){<br/>                this.x = x; this.y = y; this.dir = dir;<br/>            }<br/>            update(){<br/>                switch(this.dir){<br/>                    case DIR.UP:this.y-=BULLET_SPEED;break;<br/>                    case DIR.DOWN:this.y+=BULLET_SPEED;break;<br/>                    case DIR.LEFT:this.x-=BULLET_SPEED;break;<br/>                    case DIR.RIGHT:this.x+=BULLET_SPEED;break;<br/>                }<br/>            }<br/>            draw(){<br/>                ctx.fillStyle = '#ff0';<br/>                ctx.beginPath();<br/>                ctx.arc(this.x,this.y,BULLET_SIZE,0,Math.PI*2);<br/>                ctx.fill();<br/>            }<br/>            isOut(){<br/>                return this.x<0||this.y<0||this.x>canvas.width||this.y>canvas.height;<br/>            }<br/>        }<br/><br/>        let player,enemies=[],bullets=[];<br/>        function initGame(){<br/>            player = new Tank(30,canvas.height-60,DIR.UP,'#0099ff',true);<br/>            enemies.push(new Tank(250,30,DIR.DOWN,'#f33'));<br/>            enemies.push(new Tank(400,30,DIR.RIGHT,'#f33'));<br/>            bullets = [];<br/>        }<br/><br/>        // 键盘监听<br/>        window.addEventListener('keydown',e=>{<br/>            keys[e.key] = true;<br/>            if(e.code==='Space'){<br/>                let bx = player.x+TANK_SIZE/2;<br/>                let by = player.y+TANK_SIZE/2;<br/>                bullets.push(new Bullet(bx,by,player.dir));<br/>            }<br/>        })<br/>        window.addEventListener('keyup',e=>keys[e.key]=false);<br/><br/>        function gameLoop(){<br/>            ctx.clearRect(0,0,canvas.width,canvas.height);<br/>            player.move();<br/>            player.draw();<br/><br/>            enemies.forEach(e=>{<br/>                e.move();<br/>                e.draw();<br/>            })<br/><br/>            bullets.forEach(b=>{<br/>                b.update();<br/>                b.draw();<br/>            })<br/>            // 清除出界子弹<br/>            bullets = bullets.filter(b=>!b.isOut());<br/>            requestAnimationFrame(gameLoop);<br/>        }<br/><br/>        initGame();<br/>        gameLoop();<br/>    </script><br/></body><br/></html>
